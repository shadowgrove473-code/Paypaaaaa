<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Majestic RP — Генератор премий</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CryptoJS для SHA-256 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Экран авторизации -->
<div id="lockScreen">
    <div class="auth-box">
        <div class="logo" style="justify-content:center; margin-bottom:12px;">
            <div class="logo-icon"></div>
            <div>
                <div class="logo-text">Majestic RP</div>
                <div class="logo-sub">Панель премий</div>
            </div>
        </div>
        <h2>🔐 Доступ ограничен</h2>
        <p>Введите секретный пароль:</p>
        <input type="password" id="passInput" placeholder="Пароль">
        <button class="btn" style="width:100%; margin-top:10px;" onclick="checkPassword()">Войти</button>
        <div id="wrongPass">Неверный пароль</div>
    </div>
</div>

<!-- Основной интерфейс -->
<div id="mainContent" style="display:none;">
    <div class="page">
        <div class="header-row">
            <div class="logo">
                <div class="logo-icon"></div>
                <div>
                    <div class="logo-text">Majestic RP</div>
                    <div class="logo-sub">Генератор премий</div>
                </div>
            </div>

            <label class="theme-toggle">
                <span>Тема</span>
                <input type="checkbox" id="themeSwitch">
            </label>
        </div>

        <div class="container">
            <div class="header-row">
                <h2>📋 Приемы фракции</h2>
                <div class="sync-status" id="syncStatus">
                    <div class="sync-dot"></div>
                    <span>Ожидание...</span>
                </div>
            </div>

            <div class="mass-actions">
                <input type="number" id="massAmount" placeholder="Сумма">
                <input type="text" id="massComment" placeholder="Комментарий">
                <button class="btn" onclick="applyMassActions()">Массово</button>
                <button class="btn btn-secondary" onclick="loadMembersFromGithub()">🔄 Обновить</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                            <th>Имя</th>
                            <th>Static ID</th>
                            <th>Сумма</th>
                            <th>Комментарий</th>
                        </tr>
                    </thead>
                    <tbody id="membersTable">
                        <tr><td colspan="5" style="text-align:center; opacity:0.8;">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>

            <button class="btn btn-download" onclick="downloadTxtFile()">💾 Скачать (.txt)</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
