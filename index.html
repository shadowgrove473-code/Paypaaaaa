<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Majestic RP — Генератор премий</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CryptoJS для SHA-256 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f0f0f;
            color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        #lockScreen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .auth-box {
            background: #1e1e1e;
            padding: 25px 30px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #111;
            color: #fff;
        }

        button {
            background: #1976d2;
            cursor: pointer;
        }

        button:hover {
            background: #2196f3;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: #1e1e1e;
            padding: 20px 25px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border-bottom: 1px solid #333;
            padding: 8px 10px;
        }

        .btn-download {
            background: #43a047;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<!-- Экран авторизации -->
<div id="lockScreen">
    <div class="auth-box">
        <h2>🔐 Доступ ограничен</h2>
        <p>Введите секретный пароль от панели премий:</p>
        <input type="password" id="passInput" placeholder="Пароль">
        <button onclick="checkPassword()">Войти в панель</button>
        <div id="wrongPass" style="color:#ff5252; display:none;">Неверный пароль</div>
    </div>
</div>

<!-- Основной интерфейс -->
<div id="mainContent" style="display:none;">
    <div class="container">
        <h2>📋 Приемы фракции</h2>

        <div class="mass-actions">
            <input type="number" id="massAmount" placeholder="Сумма премий" style="width:130px;">
            <input type="text" id="massComment" placeholder="Комментарий" style="width:200px;">
            <button onclick="applyMassActions()">Применить массово</button>
            <button onclick="loadMembersFromGithub()" style="background:#555;">🔄 Обновить список</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                    <th>Имя</th>
                    <th>Static ID</th>
                    <th>Сумма</th>
                    <th>Комментарий</th>
                </tr>
            </thead>
            <tbody id="membersTable">
                <tr><td colspan="5">Загрузка...</td></tr>
            </tbody>
        </table>

        <button class="btn-download" onclick="downloadTxtFile()">💾 Скачать файл (.txt)</button>
    </div>
</div>

<script>
    const PASSWORD_HASH = "b6b0b5e8f7e6a0e3f0c3d2e1a9c4b7f8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4";

    const GIST_URL =
        "https://raw.githubusercontent.com/shadowgrove473-code/Paypaaaaa/refs/heads/main/members.txt";

    let members = [];

    function checkPassword() {
        const input = document.getElementById('passInput').value;
        const errorDiv = document.getElementById('wrongPass');

        const inputHash = CryptoJS.SHA256(input).toString();

        if (inputHash === PASSWORD_HASH) {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadMembersFromGithub();
        } else {
            errorDiv.style.display = 'block';
            document.getElementById('passInput').value = '';
        }
    }

    // Вход по Enter
    document.getElementById('passInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') checkPassword();
    });

    async function loadMembersFromGithub() {
        const tbody = document.getElementById('membersTable');

        try {
            const response = await fetch(GIST_URL + "?nocache=" + Date.now());
            const text = await response.text();

            members = [];

            text.split(/\r?\n/).forEach(line => {
                const clean = line.trim();
                if (!clean) return;

                const parts = clean.split(',');
                members.push({
                    name: parts[0].trim(),
                    staticId: parts[1] ? parts[1].trim() : "0"
                });
            });

            renderTable();
        } catch (err) {
            tbody.innerHTML =
                "<tr><td colspan='5' style='color:#ff5252;'>Ошибка загрузки списка</td></tr>";
        }
    }

    function renderTable() {
        const tbody = document.getElementById('membersTable');
        tbody.innerHTML = "";

        members.forEach((m, i) => {
            tbody.innerHTML += `
                <tr>
                    <td><input type="checkbox" class="user-checkbox" data-index="${i}"></td>
                    <td>${m.name}</td>
                    <td>${m.staticId}</td>
                    <td><input type="number" id="amount-${i}" placeholder="0"></td>
                    <td><input type="text" id="comment-${i}" placeholder="Комментарий"></td>
                </tr>
            `;
        });
    }

    function toggleAll(master) {
        document.querySelectorAll('.user-checkbox')
            .forEach(cb => cb.checked = master.checked);
    }

    function applyMassActions() {
        const amount = document.getElementById('massAmount').value;
        const comment = document.getElementById('massComment').value;

        document.querySelectorAll('.user-checkbox').forEach(cb => {
            if (cb.checked) {
                const i = cb.dataset.index;
                if (amount) document.getElementById(`amount-${i}`).value = amount;
                if (comment) document.getElementById(`comment-${i}`).value = comment;
            }
        });
    }

    function downloadTxtFile() {
        let fileContent = "staticId;amount;comment\r\n";
        let count = 0;

        document.querySelectorAll('.user-checkbox').forEach(cb => {
            if (cb.checked) {
                const i = cb.dataset.index;
                const staticId = members[i].staticId;
                const amount = document.getElementById(`amount-${i}`).value.trim();
                const comment = document.getElementById(`comment-${i}`).value.trim() || "Приемка";

                if (amount && parseInt(amount) > 0) {
                    fileContent += `${staticId};${amount};${comment}\r\n`;
                    count++;
                }
            }
        });

        if (count === 0) return alert("Выберите людей и укажите сумму!");
        if (count > 100) return alert("Majestic принимает не более 100 человек за раз.");

        const blob = new Blob([fileContent], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Приемка.txt";
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
