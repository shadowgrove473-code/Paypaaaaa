<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Majestic RP — Генератор премий</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CryptoJS для SHA-256 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        /* ====== ОСНОВА ====== */
body {
    font-family: "Inter", system-ui, sans-serif;
    background: radial-gradient(circle at top, #0f0f0f, #000);
    color: #fff;
    margin: 0;
    padding: 0;
}

/* ====== GLASSMORPHISM КАРТОЧКИ ====== */
.container {
    max-width: 1100px;
    margin: 40px auto;
    padding: 25px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.08);
}

/* ====== НЕОН МАДЖЕСТИК ====== */
:root {
    --maj-blue: #00eaff;
    --maj-purple: #b400ff;
    --maj-glow: 0 0 12px rgba(0, 234, 255, 0.6);
}

/* ====== ЗАГОЛОВОК ====== */
h2 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 15px;
    background: linear-gradient(90deg, var(--maj-blue), var(--maj-purple));
    -webkit-background-clip: text;
    color: transparent;
}

/* ====== КНОПКИ ====== */
button {
    background: linear-gradient(135deg, var(--maj-blue), var(--maj-purple));
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    transition: 0.25s;
    box-shadow: var(--maj-glow);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 18px rgba(0, 234, 255, 0.9);
}

/* ====== ПОЛЯ ВВОДА ====== */
input {
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.18);
    padding: 8px 12px;
    border-radius: 10px;
    color: #fff;
    outline: none;
    transition: 0.25s;
}

input:focus {
    border-color: var(--maj-blue);
    box-shadow: var(--maj-glow);
}

/* ====== ТАБЛИЦА ====== */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}

th {
    background: rgba(255, 255, 255, 0.08);
    padding: 10px;
    border-radius: 10px;
    text-align: left;
}

td {
    padding: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

tr:hover {
    background: rgba(255, 255, 255, 0.05);
}

/* ====== ЧЕКБОКСЫ ====== */
input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--maj-blue);
}

/* ====== ЭКРАН АВТОРИЗАЦИИ ====== */
#lockScreen {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(12px);
}

.auth-box {
    width: 360px;
    padding: 30px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 40px rgba(0, 234, 255, 0.15);
    text-align: center;
}

.auth-box h2 {
    margin-bottom: 10px;
}

#wrongPass {
    margin-top: 10px;
    color: #ff4d4d;
    font-size: 14px;
}

/* ====== СТАТУС СИНХРОНИЗАЦИИ ====== */
.sync-status {
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.25);
    font-size: 13px;
    background: rgba(255, 255, 255, 0.05);
}

    </style>
</head>
<body>

<!-- Экран авторизации -->
<div id="lockScreen">
    <div class="auth-box">
        <h2>🔐 Доступ ограничен</h2>
        <p>Введите секретный пароль от панели премий:</p>
        <input type="password" id="passInput" placeholder="Пароль">
        <button onclick="checkPassword()">Войти в панель</button>
        <div id="wrongPass" style="color:#ff5252; display:none;">Неверный пароль</div>
    </div>
</div>

<!-- Основной интерфейс -->
<div id="mainContent" style="display:none;">
    <div class="container">
        <h2>📋 Приемы фракции</h2>

        <div class="mass-actions">
            <input type="number" id="massAmount" placeholder="Сумма премий" style="width:130px;">
            <input type="text" id="massComment" placeholder="Комментарий" style="width:200px;">
            <button onclick="applyMassActions()">Применить массово</button>
            <button onclick="loadMembersFromGithub()" style="background:#555;">🔄 Обновить список</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                    <th>Имя</th>
                    <th>Static ID</th>
                    <th>Сумма</th>
                    <th>Комментарий</th>
                </tr>
            </thead>
            <tbody id="membersTable">
                <tr><td colspan="5">Загрузка...</td></tr>
            </tbody>
        </table>

        <button class="btn-download" onclick="downloadTxtFile()">💾 Скачать файл (.txt)</button>
    </div>
</div>

<script>
    const PASSWORD_HASH = "b6b0b5e8f7e6a0e3f0c3d2e1a9c4b7f8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4";


    const GIST_URL =
        "https://raw.githubusercontent.com/shadowgrove473-code/Paypaaaaa/refs/heads/main/members.txt";

    let members = [];

    function checkPassword() {
        const input = document.getElementById('passInput').value;
        const errorDiv = document.getElementById('wrongPass');

        const inputHash = CryptoJS.SHA256(input).toString();

        if (inputHash === PASSWORD_HASH) {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadMembersFromGithub();
        } else {
            errorDiv.style.display = 'block';
            document.getElementById('passInput').value = '';
        }
    }

    // Вход по Enter
    document.getElementById('passInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') checkPassword();
    });

    async function loadMembersFromGithub() {
        const tbody = document.getElementById('membersTable');

        try {
            const response = await fetch(GIST_URL + "?nocache=" + Date.now());
            const text = await response.text();

            members = [];

            text.split(/\r?\n/).forEach(line => {
                const clean = line.trim();
                if (!clean) return;

                const parts = clean.split(',');
                members.push({
                    name: parts[0].trim(),
                    staticId: parts[1] ? parts[1].trim() : "0"
                });
            });

            renderTable();
        } catch (err) {
            tbody.innerHTML =
                "<tr><td colspan='5' style='color:#ff5252;'>Ошибка загрузки списка</td></tr>";
        }
    }

    function renderTable() {
        const tbody = document.getElementById('membersTable');
        tbody.innerHTML = "";

        members.forEach((m, i) => {
            tbody.innerHTML += `
                <tr>
                    <td><input type="checkbox" class="user-checkbox" data-index="${i}"></td>
                    <td>${m.name}</td>
                    <td>${m.staticId}</td>
                    <td><input type="number" id="amount-${i}" placeholder="0"></td>
                    <td><input type="text" id="comment-${i}" placeholder="Комментарий"></td>
                </tr>
            `;
        });
    }

    function toggleAll(master) {
        document.querySelectorAll('.user-checkbox')
            .forEach(cb => cb.checked = master.checked);
    }

    function applyMassActions() {
        const amount = document.getElementById('massAmount').value;
        const comment = document.getElementById('massComment').value;

        document.querySelectorAll('.user-checkbox').forEach(cb => {
            if (cb.checked) {
                const i = cb.dataset.index;
                if (amount) document.getElementById(`amount-${i}`).value = amount;
                if (comment) document.getElementById(`comment-${i}`).value = comment;
            }
        });
    }

    function downloadTxtFile() {
        let fileContent = "staticId;amount;comment\r\n";
        let count = 0;

        document.querySelectorAll('.user-checkbox').forEach(cb => {
            if (cb.checked) {
                const i = cb.dataset.index;
                const staticId = members[i].staticId;
                const amount = document.getElementById(`amount-${i}`).value.trim();
                const comment = document.getElementById(`comment-${i}`).value.trim() || "Приемка";

                if (amount && parseInt(amount) > 0) {
                    fileContent += `${staticId};${amount};${comment}\r\n`;
                    count++;
                }
            }
        });

        if (count === 0) return alert("Выберите людей и укажите сумму!");
        if (count > 100) return alert("Majestic принимает не более 100 человек за раз.");

        const blob = new Blob([fileContent], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Приемка.txt";
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
