<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Majestic RP — Генератор премий</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CryptoJS для SHA-256 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <style>
        :root {
            --maj-blue: #4fd1ff;
            --maj-purple: #b37dff;
            --maj-bg-dark: #070a10;
            --maj-bg-light: #f3f5ff;
            --maj-text-dark: #f5f7ff;
            --maj-text-light: #111322;
        }

        body {
            font-family: "Inter", system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top, #101320, #05060a);
            color: var(--maj-text-dark);
            transition: background 0.4s, color 0.4s;
        }

        body.light {
            background: radial-gradient(circle at top, #ffffff, #d7ddff);
            color: var(--maj-text-light);
        }

        .page {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Логотип */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            background: radial-gradient(circle at top, var(--maj-blue), var(--maj-purple));
            box-shadow: 0 0 18px rgba(79, 209, 255, 0.7);
            position: relative;
            overflow: hidden;
        }

        .logo-icon::after {
            content: "";
            position: absolute;
            inset: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.25);
        }

        .logo-text {
            font-weight: 600;
            letter-spacing: 0.04em;
            font-size: 17px;
        }

        .logo-sub {
            font-size: 12px;
            opacity: 0.7;
        }

        /* Экран авторизации */
        #lockScreen {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(14px);
            animation: fadeIn 0.35s ease-out;
            z-index: 10;
        }

        .auth-box {
            width: 360px;
            padding: 26px 26px 22px;
            border-radius: 18px;
            background: rgba(18, 22, 35, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(22px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            animation: slideUp 0.35s ease-out;
        }

        .auth-box h2 {
            margin-bottom: 8px;
            font-size: 20px;
            background: linear-gradient(90deg, var(--maj-blue), var(--maj-purple));
            -webkit-background-clip: text;
            color: transparent;
        }

        .auth-box p {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 14px;
        }

        #wrongPass {
            margin-top: 10px;
            color: #ff6b6b;
            font-size: 13px;
            display: none;
        }

        /* Основной контейнер */
        .container {
            margin-top: 10px;
            padding: 22px;
            border-radius: 18px;
            background: rgba(18, 22, 35, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
            animation: fadeIn 0.35s ease-out;
        }

        body.light .container {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--maj-blue), var(--maj-purple));
            -webkit-background-clip: text;
            color: transparent;
        }

        .header-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        /* Тема */
        .theme-toggle {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.8;
        }

        .theme-toggle input {
            width: 34px;
        }

        /* Кнопки */
        .btn {
            background: radial-gradient(circle at top left, var(--maj-blue), var(--maj-purple));
            border: none;
            padding: 9px 16px;
            border-radius: 999px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 0 16px rgba(79, 209, 255, 0.7);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: "";
            position: absolute;
            top: -40%;
            left: -40%;
            width: 180%;
            height: 180%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.35), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(79, 209, 255, 0.9);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        body.light .btn-secondary {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.12);
            color: var(--maj-text-light);
        }

        .btn-download {
            margin-top: 14px;
        }

        /* Поля ввода */
        input[type="text"],
        input[type="number"],
        input[type="password"] {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 7px 11px;
            border-radius: 10px;
            color: #f5f7ff;
            outline: none;
            transition: 0.25s;
            font-size: 13px;
        }

        body.light input[type="text"],
        body.light input[type="number"],
        body.light input[type="password"] {
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(0, 0, 0, 0.12);
            color: var(--maj-text-light);
        }

        input:focus {
            border-color: var(--maj-blue);
            box-shadow: 0 0 10px rgba(79, 209, 255, 0.7);
        }

        .mass-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .mass-actions input {
            min-width: 130px;
        }

        /* Таблица + рамка */
        .table-wrapper {
            margin-top: 12px;
            border-radius: 16px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(79, 209, 255, 0.7), rgba(179, 125, 255, 0.7));
            box-shadow: 0 0 20px rgba(79, 209, 255, 0.5);
        }

        body.light .table-wrapper {
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.12);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(10, 13, 20, 0.96);
        }

        body.light table {
            background: rgba(245, 247, 255, 0.98);
        }

        th, td {
            padding: 9px;
            font-size: 13px;
        }

        th {
            background: rgba(255, 255, 255, 0.06);
            text-align: left;
        }

        body.light th {
            background: rgba(0, 0, 0, 0.04);
        }

        td {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        body.light td {
            border-top: 1px solid rgba(0, 0, 0, 0.06);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        body.light tr:hover {
            background: rgba(0, 0, 0, 0.03);
        }

        input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: var(--maj-blue);
        }

        /* Статус синхронизации */
        .sync-status {
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            font-size: 12px;
            background: rgba(255, 255, 255, 0.04);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--maj-blue);
            box-shadow: 0 0 8px rgba(79, 209, 255, 0.9);
        }

        .sync-status.syncing .sync-dot {
            animation: pulse 1s infinite;
        }

        .sync-status.ok .sync-dot {
            background: #4caf50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.9);
        }

        .sync-status.error .sync-dot {
            background: #ff6b6b;
            box-shadow: 0 0 8px rgba(255, 107, 107, 0.9);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 768px) {
            .container { padding: 18px; }
            .mass-actions { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<div id="lockScreen">
    <div class="auth-box">
        <div class="logo" style="justify-content:center; margin-bottom:12px;">
            <div class="logo-icon"></div>
            <div>
                <div class="logo-text">Majestic RP</div>
                <div class="logo-sub">Панель премий</div>
            </div>
        </div>
        <h2>🔐 Доступ ограничен</h2>
        <p>Введите секретный пароль от панели премий:</p>
        <input type="password" id="passInput" placeholder="Пароль">
        <button class="btn" style="width:100%; margin-top:10px;" onclick="checkPassword()">Войти в панель</button>
        <div id="wrongPass">Неверный пароль</div>
    </div>
</div>

<div id="mainContent" style="display:none;">
    <div class="page">
        <div class="header-row">
            <div class="logo">
                <div class="logo-icon"></div>
                <div>
                    <div class="logo-text">Majestic RP</div>
                    <div class="logo-sub">Генератор премий</div>
                </div>
            </div>

            <label class="theme-toggle">
                <span>Тема: ночь / день</span>
                <input type="checkbox" id="themeSwitch">
            </label>
        </div>

        <div class="container">
            <div class="header-row">
                <h2>📋 Приемы фракции</h2>
                <div class="sync-status" id="syncStatus">
                    <div class="sync-dot"></div>
                    <span>Ожидание...</span>
                </div>
            </div>

            <div class="mass-actions">
                <input type="number" id="massAmount" placeholder="Сумма премий">
                <input type="text" id="massComment" placeholder="Комментарий">
                <button class="btn" onclick="applyMassActions()">Применить массово</button>
                <button class="btn btn-secondary" onclick="loadMembersFromGithub()">🔄 Обновить список</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onclick="toggleAll(this)"></th>
                            <th>Имя</th>
                            <th>Static ID</th>
                            <th>Сумма</th>
                            <th>Комментарий</th>
                        </tr>
                    </thead>
                    <tbody id="membersTable">
                        <tr><td colspan="5" style="text-align:center; opacity:0.8;">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>

            <button class="btn btn-download" onclick="downloadTxtFile()">💾 Скачать файл (.txt)</button>
        </div>
    </div>
</div>

<script>
  

    const PASSWORD_HASH = "c8f1e92c2e4e2e4d3c9f0b9e4a2d3f7b9e0c1a3b4d5e6f7a8b9c0d1e2f3a4b5";

    const GIST_URL =
        "https://raw.githubusercontent.com/shadowgrove473-code/Paypaaaaa/refs/heads/main/members.txt";

    let members = [];

    function checkPassword() {
        const input = document.getElementById('passInput').value.trim();
        const errorDiv = document.getElementById('wrongPass');

        const inputHash = CryptoJS.SHA256(input).toString();

        if (inputHash === PASSWORD_HASH) {
            errorDiv.style.display = 'none';
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadMembersFromGithub();
        } else {
            errorDiv.style.display = 'block';
        }
    }

    document.getElementById('passInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') checkPassword();
    });

    document.getElementById('themeSwitch').addEventListener('change', function(e) {
        if (e.target.checked) {
            document.body.classList.add('light');
        } else {
            document.body.classList.remove('light');
        }
    });

    async function loadMembersFromGithub() {
        const tbody = document.getElementById('membersTable');
        const status = document.getElementById('syncStatus');
        const text = status.querySelector('span');

        status.classList.remove('ok', 'error');
        status.classList.add('syncing');
        text.textContent = "Синхронизация...";
        tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; opacity:0.8;'>Загрузка актуального списка...</td></tr>";

        try {
            const response = await fetch(GIST_URL + "?nocache=" + Date.now());
            if (!response.ok) throw new Error("Ошибка сети");

            const raw = await response.text();
            const lines = raw.split(/\r?\n/);

            members = [];

            lines.forEach(line => {
                const clean = line.trim();
                if (!clean) return;
                const parts = clean.split(',');
                members.push({
                    name: parts[0]?.trim() || "Сотрудник",
                    staticId: parts[1]?.trim() || "0"
                });
            });

            renderTable();

            status.classList.remove('syncing', 'error');
            status.classList.add('ok');
            text.textContent = "✓ Синхронизировано с GitHub";
        } catch (err) {
            console.error(err);
            status.classList.remove('syncing', 'ok');
            status.classList.add('error');
            text.textContent = "✗ Ошибка загрузки";
            tbody.innerHTML =
                "<tr><td colspan='5' style='text-align:center; color:#ff6b6b;'>Не удалось загрузить список. Проверьте, открыт ли репозиторий.</td></tr>";
        }
    }

    function renderTable() {
        const tbody = document.getElementById('membersTable');
        tbody.innerHTML = "";

        if (members.length === 0) {
            tbody.innerHTML =
                "<tr><td colspan='5' style='text-align:center; opacity:0.8;'>Файл members.txt пуст.</td></tr>";
            return;
        }

        members.forEach((m, i) => {
            tbody.innerHTML += `
                <tr>
                    <td><input type="checkbox" class="user-checkbox" data-index="${i}"></td>
                    <td>${m.name}</td>
                    <td><strong style="color:#4fd1ff;">${m.staticId}</strong></td>
                    <td><input type="number" id="amount-${i}" placeholder="0"></td>
                    <td><input type="text" id="comment-${i}" placeholder="Комментарий"></td>
                </tr>
            `;
        });
    }

    function toggleAll(master) {
        document.querySelectorAll('.user-checkbox')
            .forEach(cb => cb.checked = master.checked);
    }

    function applyMassActions() {
        const amount = document.getElementById('massAmount').value;
        const comment = document.getElementById('massComment').value;

        document.querySelectorAll('.user-checkbox').forEach(cb => {
            if (cb.checked) {
                const i = cb.dataset.index;
                if (amount) document.getElementById(`amount-${i}`).value = amount;
                if (comment) document.getElementById(`comment-${i}`).value = comment;
            }
        });
    }

    function downloadTxtFile() {
        let fileContent = "staticId;amount;comment\r\n";
        let count = 0;

        document.querySelectorAll('.user-checkbox').forEach(cb => {
            if (cb.checked) {
                const i = cb.dataset.index;
                const staticId = members[i].staticId;
                const amount = document.getElementById(`amount-${i}`).value.trim();
                const comment = document.getElementById(`comment-${i}`).value.trim() || "Приемка";

                if (amount && parseInt(amount) > 0) {
                    fileContent += `${staticId};${amount};${comment}\r\n`;
                    count++;
                }
            }
        });

        if (count === 0) return alert("Выберите людей и укажите сумму!");
        if (count > 100) return alert("Majestic принимает не более 100 человек за раз.");

        const blob = new Blob([fileContent], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Приемка.txt";
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
